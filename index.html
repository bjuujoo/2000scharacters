<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Galmuri9', sans-serif;
        background: #f1f3f2;
        color: #333;
    }

    .topbar {
        background: linear-gradient(to bottom, #ddeeff, #10c6b3);
        border-bottom: 2px solid #6699cc;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px;
        position: sticky;
        top: 0;
        z-index: 5;
    }
    .topbar .logo {
        font-size: 25px;
        font-weight: 600;
        color: #336699;
        font-family: 'Galmuri9', sans-serif;
        font-style: normal;
        padding: 0;
        text-decoration: none;
        line-height: 1.2;
        letter-spacing: -1px;
    }

    .grid-wrap {
        max-width: 1200px;
        margin: 16px auto;
        padding: 0 14px;
    }
    .char-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
    
    }
    .char-cell {
        position: relative;
        aspect-ratio: 1;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        transition: background 0.3s ease;
    }
    .char-cell:hover { filter: brightness(0.96); }
    .char-cell.seen { color: #fff; }
    .char-cell .char-label {
        font-size: 11px;
        text-align: center;
        padding: 4px;
        word-break: keep-all;
        z-index: 2;
        font-family: 'Galmuri9', sans-serif;
    }
    .char-cell.seen .char-label { color: #fff; }
    .char-cell img {
        width: 100%; height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0; left: 0;
    }

    .char-lightbox {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.85);
        z-index: 999;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
    }
    .char-lightbox.active { display: flex; }
    .lb-box {
        width: 280px;
        height: 280px;
        border: 4px solid #fff;
        border-radius: 4px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    .lb-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .char-lightbox .lb-name {
        position: absolute;
        bottom: 6%;
        color: #fff;
        font-size: 16px;
        background: rgba(0,0,0,0.5);
        padding: 6px 16px;
        border-radius: 4px;
    }

    @media (max-width: 900px) {
        .char-grid { grid-template-columns: repeat(5, 1fr); }
        .char-cell .char-label { font-size: 9px; }
    }
    @media (max-width: 600px) {
        .char-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 420px) {
        .char-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .footer {
        text-align: center;
        font-size: 10px;
        color: #888;
        margin: 16px 0 14px;
        padding-top: 6px;
    }
</style>

    const STORAGE_KEY = "char_seen_v1";

    function getSeen() {
        try {
            return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {};
        } catch (e) {
            return {};
        }
    }

    function markSeen(id) {
        const seen = getSeen();
        seen[id] = true;
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(seen));
    }

    function renderCharGrid() {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = "";
        const seen = getSeen();

        characters.forEach(ch => {
            const cell = document.createElement('div');
            cell.className = 'char-cell';

            if (seen[ch.id]) {
                cell.classList.add('seen');
                cell.style.background = ch.color || '#a98ce0';
            }

            const label = document.createElement('div');
            label.className = 'char-label';
            label.textContent = ch.name;
            cell.appendChild(label);

            cell.addEventListener('click', () => {
                markSeen(ch.id);
                if (ch.type === 'page') {
                    renderCharGrid();
                    setTimeout(() => {
                        window.location.href = ch.href;
                    }, 100);
                } else {
                    openCharLightbox(ch);
                    renderCharGrid();
                }
            });

            grid.appendChild(cell);
        });
    }

    function openCharLightbox(ch) {
        const lb = document.getElementById('charLightbox');
        const img = document.getElementById('charLightboxImg');
        const name = document.getElementById('charLightboxName');
        img.src = ch.img;
        img.alt = ch.name;
        name.textContent = ch.name;
        lb.classList.add('active');
    }

    document.getElementById('charLightbox').addEventListener('click', () => {
        document.getElementById('charLightbox').classList.remove('active');
    });

    renderCharGrid();
